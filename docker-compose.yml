services:
  # ============ core profile ============
  postgres:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/postgres:16-alpine
    ports: ["15432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reflexlearn}
      POSTGRES_USER: ${POSTGRES_USER:-reflexlearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reflexlearn}
    volumes:
      - pg_data:/var/lib/postgresql/data
    profiles: [core]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reflexlearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/redis:7-alpine
    ports: ["16379:6379"]
    volumes:
      - redis_data:/data
    profiles: [core]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}qdrant/qdrant:latest
    ports: ["16333:6333", "16334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
    profiles: [core]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ graph profile ============
  neo4j:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}neo4j:5-community
    ports: ["17474:7474", "17687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-reflexlearn}
    volumes:
      - neo4j_data:/data
    profiles: [graph]

  # ============ bigdata profile ============
  kafka:
    # apache 官方镜像（bitnami 自 2025 起免费 tag 不可匿名拉）；单节点 KRaft。
    # advertised 必须是宿主可达地址：consumer/producer 在宿主跑、连 127.0.0.1:19092，
    # 旧 bitnami 配置 advertise 容器名 kafka:9092 宿主解析不了（M4-C 此前从未活体所以没暴露）。
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}apache/kafka:latest
    ports: ["19092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    profiles: [bigdata]

  minio:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}minio/minio:latest
    ports: ["19000:9000", "19001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    profiles: [bigdata]

  # ============ observe profile ============
  prometheus:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}prom/prometheus:latest
    ports: ["19090:9090"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: [observe]

  grafana:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}grafana/grafana:latest
    ports: ["13001:3000"]
    depends_on: [prometheus]
    profiles: [observe]

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  minio_data:
